<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
<title>{{.OG.Title}}</title>
<meta property="og:title" content="{{.OG.Title}}">
<meta property="og:url" content="{{.OG.URL}}">
<meta property="og:type" content="article">
<style>
  @import url('https://fonts.googleapis.com/css2?family=PT+Mono&display=swap');
  :root {
    --paper: #fafafa;
    --ink: #2c2b28;
    --ink-light: #6b6963;
    --ink-faint: #a8a49c;
    --accent: #f8d551;
    --font-family: "PT Mono", monospace;
  }
  body { background: var(--paper); color: var(--ink); font-family: var(--font-family); font-size: 17px; max-width: 850px; margin: 3rem auto; padding: 0 1.5rem; }
  h1 { color: var(--ink); }
  p, li { color: var(--ink-light); line-height: 1.7; }
  a { color: var(--ink); }
  math { font-size: 1.1em; }
  math[display="block"] { display: block; text-align: center; margin: 1.5rem 0; font-size: 1.3em; }
</style>
</head>
<body>
{{.Body}}
</body>
</html>
