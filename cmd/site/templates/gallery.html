<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="shortcut icon" type="image/x-icon" href="../../favicon.ico">
<title>{{.Title}} | nealpatel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=PT+Mono&display=swap');
  :root {
    --paper: #fafafa;
    --ink: #2c2b28;
    --ink-faint: #a8a49c;
    --accent: #f8d551;
    --font-family: "PT Mono", monospace;
    --page-width: 60em;
  }
  body { background: var(--paper); color: var(--ink); font-family: var(--font-family); font-size: 17px; max-width: var(--page-width); margin: 3rem auto; padding: 0 1.5rem; }
  ::selection { color: var(--accent); }
  h1 { margin-bottom: 0; }
  .byline { font-size: 2em; color: var(--ink-faint); font-weight: normal; }
  .byline a { font-size: 0.5em; }
  .image-grid { display: grid; grid-template-rows: auto; grid-gap: 1em; grid-template-columns: {{.GridCSSAttr}}; }
  .image-grid a { border: none; }
  .image-grid img { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<h1>{{.Title}}</h1>
<h2 class="byline">neal patel<sup><a href="../../index.html">homepage</a></sup></h2>
<p>{{.Date}}</p>
<br>
<p>intended viewing grid: {{.Grid}}{{if .Zoom}} [<a id="zoomie">zoom</a>]{{end}}</p>
<div class="image-grid">
{{range .Images}}<a href="{{.}}" style="border: none;"><img src="{{.}}" width="auto" height="auto" alt="{{.}}"></a>
{{end}}</div>
<br>
<p>(c) 2025 neal patel</p>
<script>
var z = document.getElementById("zoomie");
if (z) z.onclick = function () {
  if (document.body.style.zoom === "1.5") {
    document.body.style.zoom = 1.0;
    z.textContent = "zoom";
  } else {
    document.body.style.zoom = 1.5;
    z.textContent = "unzoom";
  }
};
</script>
</body>
</html>
